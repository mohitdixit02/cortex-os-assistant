services:
  pg:
    image: pgvector/pgvector:pg17
    container_name: cortex-pg-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5460}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./cortex_cm/pg/sql/create_tables.sql:/docker-entrypoint-initdb.d/10-create_tables.sql

  redis:
    image: redis:latest
    container_name: cortex-redis-db
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./redis_data:/data

  cortex-queue:
    build: .
    container_name: cortex-queue
    restart: always
    ports:
      - "${CORTEX_QUEUE_PORT:-8001}:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg:5432/${POSTGRES_DB}
      - CORTEX_QUEUE_URL=http://cortex-queue:8001
    command: python cortex_queue/main.py
    depends_on:
      - redis
      - pg

  cortex-server:
    build: .
    container_name: cortex-server
    restart: always
    ports:
      - "${CORTEX_SERVER_PORT:-8000}:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg:5432/${POSTGRES_DB}
      - CORTEX_QUEUE_URL=http://cortex-queue:8001
    command: python cortex_server/main.py
    depends_on:
      - redis
      - pg
      - cortex-queue

  cortex-core:
    build: .
    container_name: cortex-core
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT="6379"
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg:5432/${POSTGRES_DB}
      - CORTEX_QUEUE_URL=http://cortex-queue:8001
    command: python cortex_core/worker.py
    depends_on:
      - redis
      - pg
      - cortex-queue

  cortex-event-worker:
    build: .
    container_name: cortex-event-worker
    restart: always
    environment:
      - TZ=${TZ}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg:5432/${POSTGRES_DB}
      - CORTEX_QUEUE_URL=http://cortex-queue:8001
    command: python cortex_event_tool/worker.py
    depends_on:
      - redis
      - pg
      - cortex-queue
